name: Build and Release Cilium

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Build for Multiple Architectures
      - name: Build Multi-Arch Binaries
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e CGO_ENABLED=1 \
            docker.elastic.co/beats-dev/golang-crossbuild:1.16.7-main \
            --build-cmd "make build" \
            -p "linux/amd64 linux/arm64"

      # Step 4: Package Binaries
      - name: Package Binaries
        run: |
          tar -czf cilium-linux-amd64.tar.gz -C ./bin/linux_amd64 cilium
          tar -czf cilium-linux-arm64.tar.gz -C ./bin/linux_arm64 cilium
          sha256sum cilium-linux-*.tar.gz > checksums.txt

      # Step 5: Create GitHub Release
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            cilium-linux-amd64.tar.gz
            cilium-linux-arm64.tar.gz
            checksums.txt
          tag: v${{ github.run_number }}
          releaseName: "Automated Release v${{ github.run_number }}"
          generateReleaseNotes: true
