name: Build and Release Cilium

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Ensure full history for any Git-related operations

    # Step 2: Fix go.mod
    - name: Fix go.mod
      run: |
        sed -i 's/go 1.23.0/go 1.23/' go.mod
        cat go.mod  # Verify the corrected Go version

    # Step 3: Set up Go
    - name: Set Up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.23  # Ensure the correct Go version is installed

    # Step 4: Install Dependencies
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm make gcc bpfcc-tools

    # Step 5: Clean Previous Builds
    - name: Clean Previous Builds
      run: |
        make clean
        for i in cilium-dbg daemon cilium-health bugtool operator plugins tools hubble-relay bpf clustermesh-apiserver; do
          make -C $i clean || true
        done

    # Step 6: Build for AMD64
    - name: Build for AMD64
      run: |
        make clean
        GOARCH=amd64 make
        if [ ! -f ./cilium ]; then
          echo "Cilium binary not found for AMD64!"
          exit 1
        fi
        tar -czf cilium-linux-amd64.tar.gz cilium
        sha256sum cilium-linux-amd64.tar.gz > cilium-linux-amd64.tar.gz.sha256sum

    # Step 7: Build for ARM64
    - name: Build for ARM64
      run: |
        make clean
        GOARCH=arm64 make
        if [ ! -f ./cilium ]; then
          echo "Cilium binary not found for ARM64!"
          exit 1
        fi
        tar -czf cilium-linux-arm64.tar.gz cilium
        sha256sum cilium-linux-arm64.tar.gz > cilium-linux-arm64.tar.gz.sha256sum

    # Step 8: Verify Artifacts
    - name: Verify Generated Artifacts
      run: |
        ls -lh cilium-linux-*.tar.gz
        ls -lh cilium-linux-*.sha256sum

    # Step 9: Create GitHub Release
    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          cilium-linux-amd64.tar.gz
          cilium-linux-amd64.tar.gz.sha256sum
          cilium-linux-arm64.tar.gz
          cilium-linux-arm64.tar.gz.sha256sum
        tag: v${{ github.run_number }}
        releaseName: "Automated Release v${{ github.run_number }}"
        generateReleaseNotes: true
