name: Build and Release Cilium

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # Step 2: Fix go.mod
    - name: Fix go.mod
      run: |
        sed -i 's/go 1.23.0/go 1.23/' go.mod
        cat go.mod

    # Step 3: Set up Go
    - name: Set Up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.23

    # Step 4: Install Dependencies
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm make gcc bpfcc-tools libelf-dev
        clang --version
        llvm-config --version

    # Step 5: Debug Architecture
    - name: Verify Runner Architecture
      run: uname -m

    # Step 6: Clean Build Environment
    - name: Clean Build Environment
      run: |
        make clean
        for i in cilium-dbg daemon cilium-health bugtool operator plugins tools hubble-relay bpf clustermesh-apiserver; do
          make -C $i clean || true
        done

    # Step 7: Debug Precheck
    - name: Debug Precheck
      run: |
        echo "Running precheck (if applicable)..."
        make precheck || echo "Precheck failed, bypassing..."

    # Step 8: Build Cilium for AMD64
    - name: Build Cilium for AMD64
      run: |
        echo "Building Cilium for AMD64..."
        make clean
        GOARCH=amd64 make VERBOSE=1 || { echo "Build failed for AMD64!"; exit 1; }

    # Step 9: Locate and Package Binary for AMD64
    - name: Locate and Package Cilium for AMD64
      run: |
        echo "Locating Cilium binary for AMD64..."
        CILIUM_BINARY=$(find . -name cilium -type f | head -n 1)
        if [ -z "$CILIUM_BINARY" ]; then
          echo "Cilium binary not found for AMD64!"
          exit 1
        fi
        echo "Packaging Cilium binary found at: $CILIUM_BINARY"
        tar -czf cilium-linux-amd64.tar.gz -C $(dirname "$CILIUM_BINARY") $(basename "$CILIUM_BINARY")
        sha256sum cilium-linux-amd64.tar.gz > cilium-linux-amd64.tar.gz.sha256sum

    # Step 10: Build Cilium for ARM64
    - name: Build Cilium for ARM64
      run: |
        echo "Building Cilium for ARM64..."
        make clean
        GOARCH=arm64 make VERBOSE=1 || { echo "Build failed for ARM64!"; exit 1; }

    # Step 11: Locate and Package Binary for ARM64
    - name: Locate and Package Cilium for ARM64
      run: |
        echo "Locating Cilium binary for ARM64..."
        CILIUM_BINARY=$(find . -name cilium -type f | head -n 1)
        if [ -z "$CILIUM_BINARY" ]; then
          echo "Cilium binary not found for ARM64!"
          exit 1
        fi
        echo "Packaging Cilium binary found at: $CILIUM_BINARY"
        tar -czf cilium-linux-arm64.tar.gz -C $(dirname "$CILIUM_BINARY") $(basename "$CILIUM_BINARY")
        sha256sum cilium-linux-arm64.tar.gz > cilium-linux-arm64.tar.gz.sha256sum

    # Step 12: Verify Artifacts
    - name: Verify Generated Artifacts
      run: |
        echo "Verifying generated artifacts..."
        ls -lh cilium-linux-*.tar.gz
        ls -lh cilium-linux-*.sha256sum

    # Step 13: Debug Directory Contents
    - name: List Build Directories
      run: |
        echo "Listing ./bin and ./output directories..."
        ls -R ./bin || echo "./bin directory not found"
        ls -R ./output || echo "./output directory not found"

    # Step 14: Create GitHub Release
    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          cilium-linux-amd64.tar.gz
          cilium-linux-amd64.tar.gz.sha256sum
          cilium-linux-arm64.tar.gz
          cilium-linux-arm64.tar.gz.sha256sum
        tag: v${{ github.run_number }}
        releaseName: "Automated Release v${{ github.run_number }}"
        generateReleaseNotes: true
