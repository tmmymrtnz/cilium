name: Build and Release Cilium

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Build for AMD64
      - name: Build for AMD64
        run: |
          echo "Building for AMD64..."
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            docker.elastic.co/beats-dev/golang-crossbuild:1.16.7-main \
            --build-cmd "env GOOS=linux GOARCH=amd64 make build"
          mv ./bin/cilium ./bin/cilium-linux-amd64

      # Step 3: Build for ARM64
      - name: Build for ARM64
        run: |
          echo "Building for ARM64..."
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            docker.elastic.co/beats-dev/golang-crossbuild:1.16.7-arm64 \
            --build-cmd "env GOOS=linux GOARCH=arm64 make build"
          mv ./bin/cilium ./bin/cilium-linux-arm64

      # Step 4: Package Binaries
      - name: Package Binaries
        run: |
          echo "Packaging binaries..."
          tar -czf cilium-linux-amd64.tar.gz ./bin/cilium-linux-amd64
          tar -czf cilium-linux-arm64.tar.gz ./bin/cilium-linux-arm64
          sha256sum cilium-linux-*.tar.gz > checksums.txt

      # Step 5: Create GitHub Release
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            cilium-linux-amd64.tar.gz
            cilium-linux-arm64.tar.gz
            checksums.txt
          tag: v${{ github.run_number }}
          releaseName: "Automated Release v${{ github.run_number }}"
          generateReleaseNotes: true
